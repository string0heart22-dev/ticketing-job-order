<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signature Pad - UBILINK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
            max-width: 800px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .signature-wrapper {
            border: 3px solid #667eea;
            border-radius: 10px;
            background: #f9f9f9;
            padding: 10px;
            margin-bottom: 20px;
        }
        
        #signature-canvas {
            width: 100%;
            height: 300px;
            background: white;
            border-radius: 5px;
            cursor: crosshair;
            touch-action: none;
        }
        
        .instructions {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-bottom: 15px;
            font-style: italic;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn-clear {
            background: #e74c3c;
            color: white;
        }
        
        .btn-clear:hover {
            background: #c0392b;
        }
        
        .btn-save {
            background: #27ae60;
            color: white;
        }
        
        .btn-save:hover {
            background: #229954;
        }
        
        .btn-download {
            background: #3498db;
            color: white;
        }
        
        .btn-download:hover {
            background: #2980b9;
        }
        
        .btn-undo {
            background: #f39c12;
            color: white;
        }
        
        .btn-undo:hover {
            background: #e67e22;
        }
        
        .color-picker-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f0f0f0;
            padding: 10px 15px;
            border-radius: 8px;
        }
        
        .color-picker-group label {
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }
        
        #pen-color {
            width: 50px;
            height: 35px;
            border: 2px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .thickness-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f0f0f0;
            padding: 10px 15px;
            border-radius: 8px;
        }
        
        .thickness-group label {
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }
        
        #pen-thickness {
            width: 100px;
        }
        
        #thickness-value {
            font-weight: bold;
            color: #667eea;
            min-width: 30px;
        }
        
        .preview-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px dashed #ddd;
        }
        
        .preview-section h3 {
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }
        
        #signature-preview {
            max-width: 100%;
            border: 2px solid #ddd;
            border-radius: 8px;
            display: none;
            margin: 0 auto;
        }
        
        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px;
            font-style: italic;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 22px;
            }
            
            #signature-canvas {
                height: 200px;
            }
            
            .controls {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✍️ Digital Signature Pad</h1>
            <p>Draw your signature below using mouse or touch</p>
        </div>
        
        <div class="instructions">
            Click and drag to draw • Touch and drag on mobile devices
        </div>
        
        <div class="signature-wrapper">
            <canvas id="signature-canvas"></canvas>
        </div>
        
        <div class="controls">
            <div class="color-picker-group">
                <label for="pen-color">Color:</label>
                <input type="color" id="pen-color" value="#000000">
            </div>
            
            <div class="thickness-group">
                <label for="pen-thickness">Thickness:</label>
                <input type="range" id="pen-thickness" min="1" max="10" value="2">
                <span id="thickness-value">2</span>
            </div>
        </div>
        
        <div class="controls">
            <button class="btn btn-undo" id="btn-undo">
                <span>↶</span> Undo
            </button>
            <button class="btn btn-clear" id="btn-clear">
                <span>🗑️</span> Clear
            </button>
            <button class="btn btn-save" id="btn-save">
                <span>💾</span> Save
            </button>
            <button class="btn btn-download" id="btn-download">
                <span>⬇️</span> Download PNG
            </button>
        </div>
        
        <div class="preview-section">
            <h3>Saved Signature Preview</h3>
            <img id="signature-preview" alt="Signature Preview">
            <div id="empty-state" class="empty-state">
                No signature saved yet. Draw and click "Save" to preview.
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('signature-canvas');
        const ctx = canvas.getContext('2d');
        const penColor = document.getElementById('pen-color');
        const penThickness = document.getElementById('pen-thickness');
        const thicknessValue = document.getElementById('thickness-value');
        const btnClear = document.getElementById('btn-clear');
        const btnSave = document.getElementById('btn-save');
        const btnDownload = document.getElementById('btn-download');
        const btnUndo = document.getElementById('btn-undo');
        const preview = document.getElementById('signature-preview');
        const emptyState = document.getElementById('empty-state');
        
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        let strokes = [];
        let currentStroke = [];
        
        // Set canvas size
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            redrawCanvas();
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // Update thickness display
        penThickness.addEventListener('input', function() {
            thicknessValue.textContent = this.value;
        });
        
        // Get coordinates
        function getCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            if (e.touches) {
                return {
                    x: (e.touches[0].clientX - rect.left) * scaleX,
                    y: (e.touches[0].clientY - rect.top) * scaleY
                };
            } else {
                return {
                    x: (e.clientX - rect.left) * scaleX,
                    y: (e.clientY - rect.top) * scaleY
                };
            }
        }
        
        // Start drawing
        function startDrawing(e) {
            e.preventDefault();
            isDrawing = true;
            const coords = getCoordinates(e);
            lastX = coords.x;
            lastY = coords.y;
            
            currentStroke = [{
                x: lastX,
                y: lastY,
                color: penColor.value,
                thickness: penThickness.value
            }];
        }
        
        // Draw
        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            
            const coords = getCoordinates(e);
            
            ctx.strokeStyle = penColor.value;
            ctx.lineWidth = penThickness.value;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(coords.x, coords.y);
            ctx.stroke();
            
            currentStroke.push({
                x: coords.x,
                y: coords.y,
                color: penColor.value,
                thickness: penThickness.value
            });
            
            lastX = coords.x;
            lastY = coords.y;
        }
        
        // Stop drawing
        function stopDrawing() {
            if (isDrawing && currentStroke.length > 0) {
                strokes.push([...currentStroke]);
            }
            isDrawing = false;
        }
        
        // Redraw canvas
        function redrawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            strokes.forEach(stroke => {
                if (stroke.length < 2) return;
                
                ctx.strokeStyle = stroke[0].color;
                ctx.lineWidth = stroke[0].thickness;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                ctx.beginPath();
                ctx.moveTo(stroke[0].x, stroke[0].y);
                
                for (let i = 1; i < stroke.length; i++) {
                    ctx.lineTo(stroke[i].x, stroke[i].y);
                }
                ctx.stroke();
            });
        }
        
        // Clear canvas
        btnClear.addEventListener('click', function() {
            if (confirm('Are you sure you want to clear the signature?')) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                strokes = [];
                currentStroke = [];
            }
        });
        
        // Undo last stroke
        btnUndo.addEventListener('click', function() {
            if (strokes.length > 0) {
                strokes.pop();
                redrawCanvas();
            }
        });
        
        // Save signature
        btnSave.addEventListener('click', function() {
            if (strokes.length === 0) {
                alert('Please draw a signature first!');
                return;
            }
            
            const dataURL = canvas.toDataURL('image/png');
            preview.src = dataURL;
            preview.style.display = 'block';
            emptyState.style.display = 'none';
            
            // Store in localStorage
            localStorage.setItem('signature', dataURL);
            
            console.log('Signature saved, checking for opener window...');
            console.log('window.opener exists:', !!window.opener);
            
            // Send signature to parent window (subscription agreement)
            if (window.opener && !window.opener.closed) {
                console.log('Sending message to parent window');
                window.opener.postMessage({
                    type: 'signature',
                    signature: dataURL
                }, '*');
                
                alert('Signature saved and sent to subscription agreement!');
                
                // Close the window after a delay
                setTimeout(function() {
                    console.log('Closing window');
                    window.close();
                }, 1000);
            } else {
                console.log('No opener window found');
                alert('Signature saved! Please manually close this window and refresh the subscription agreement.');
            }
        });
        
        // Download signature
        btnDownload.addEventListener('click', function() {
            if (strokes.length === 0) {
                alert('Please draw a signature first!');
                return;
            }
            
            const dataURL = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = 'signature_' + Date.now() + '.png';
            link.href = dataURL;
            link.click();
        });
        
        // Mouse events
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);
        
        // Touch events
        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDrawing);
        
        // Load saved signature on page load
        window.addEventListener('load', function() {
            const savedSignature = localStorage.getItem('signature');
            if (savedSignature) {
                preview.src = savedSignature;
                preview.style.display = 'block';
                emptyState.style.display = 'none';
            }
        });
    </script>
</body>
</html>
